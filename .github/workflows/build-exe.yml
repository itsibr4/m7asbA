name: Build EXE

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "نظام_المحاسبة_v2" --clean --noconfirm --hidden-import PySide6.QtCore --hidden-import PySide6.QtGui --hidden-import PySide6.QtWidgets --hidden-import sqlite3 --hidden-import database --hidden-import login_window --hidden-import main_window --hidden-import settings --hidden-import pages --hidden-import pages.customers_page --hidden-import pages.dashboard_page --hidden-import pages.developer_page --hidden-import pages.expenses_page --hidden-import pages.inventory_page --hidden-import pages.pos_page --hidden-import pages.products_page --hidden-import pages.reports_page --hidden-import pages.settings_page --hidden-import pages.users_page --collect-submodules pages main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: نظام_المحاسبة_exe
          path: dist/*.exe

      - name: Create Release with direct download link
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
